<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geeks for Geeks Logo</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .wrapper{
            border: 1px solid red;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle{
            height: 100px;
            width: 100px;
            border: 20px solid green;
            border-radius: 100px;
            position: relative;
        }
        .circle:after{
            content: "";
            position: absolute;
            border-top: 100px solid transparent;
            top: -35px;
        }
        #circle1:after{
            border-left: 140px solid #EFEFEF;
            left: -50px;
            top: -35px;
        }
        #circle2:after{
            border-right: 140px solid #EFEFEF;
            right: -50px;
        }
        #circle1:before{
            content: "";
            height: 20px;
            width: 276px;
            position: absolute;
            background: green;
            left: -18px;
            top: 45px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="circle1" class="circle"></div>
        <div id="circle2" class="circle"></div>
    </div>
</body>
</html>

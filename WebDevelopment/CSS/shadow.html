<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow</title>
    <style>
        .textshadow{
            color: green;
            text-shadow: 3px 3px 3px orange;
        }
        .boxshadow{
            width: 200px;
            height: 60px;
            background-color: rgb(218, 242, 138);
            box-shadow: 5px 5px 5px gray;
        }
    </style>
</head>
<body>
    <h1>CSS Shadow Effect</h1>
    <h1 class="textshadow">Lorem ipsum dolor sit amet consectetur adipisicing elit. Vel, officia?</h1>
    <div class="boxshadow">
        Deepu Dhuriya
    </div>
</body>
</html>

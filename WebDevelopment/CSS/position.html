<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        div{
            border: 1px solid black;
            padding: 10px;
            margin: 10px;
        }
        .relative{
            position: relative;
            top: 10px;
            left: 30px;
        }
        .container{
            position: relative;
            width: 300px;
            height: 200px;
            border: 2px solid black;
            margin: 2px auto;
        }
        .absolute{
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: pink;
            padding: 10px;
        }
        .content{
            height: 1200px;
            padding: 10px;
        }
        .fixed{
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: lightgreen;
            padding: 20px;
            border: 2px solid black;
        }
        .sticky{
            position: sticky;
            top: 0;
            background-color: yellow;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div>Box1</div>
    <div class="relative">Box 2</div>
    <div class="container">
        <p>Container with Relative Positioning</p>
        <div class="absolute">
                Absolutely Positioned Element
        </div>
    </div>
    <h2>Fixed Positioning Example</h2>
    <div class="fixed">Fixed Box</div>
    <div class="content">
        <p>Scroll down to see that the fixed box stays in place.</p>
        <p>This content simulates a long page.</p>
    </div>
    <div class="sticky">
        I am sticky
    </div>
    <p>Scroll down to see the effect.</p>
    <div style="height: 1000px;"></div>
</body>
</html>
